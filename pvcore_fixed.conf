# =============================================================
# PVCore — nginx config: FRONTEND React
# Dominio: pvcore.energy4cero.com
# NOTA: Certbot agregará el bloque SSL automáticamente
# =============================================================

server {
    listen 80 default_server;
    server_name pvcore.energy4cero.com;

    root /var/www/pvcore/frontend;
    index index.html;

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml image/svg+xml;

    # Cache de assets estáticos
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # SPA: todas las rutas van a index.html (React Router)
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Logs
    access_log /var/log/pvcore/frontend-access.log;
    error_log  /var/log/pvcore/frontend-error.log;
}
