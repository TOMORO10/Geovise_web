server {
    server_name geovise.io 159.223.122.52 localhost;
    root /var/www/geovise;
    index index.html;

    location / {
        try_files $uri $uri/ =404;
    }

    # Optional: Cache control for static assets
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg)$ {
        expires 30d;
        add_header Cache-Control "public, no-transform";
    }

    listen 443 ssl; # managed by Certbot
    ssl_certificate /etc/letsencrypt/live/geovise.io/fullchain.pem; # managed by Certbot
    ssl_certificate_key /etc/letsencrypt/live/geovise.io/privkey.pem; # managed by Certbot
    include /etc/letsencrypt/options-ssl-nginx.conf; # managed by Certbot
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem; # managed by Certbot


}
server {
    if ($host = geovise.io) {
        return 301 https://$host$request_uri;
    } # managed by Certbot


    listen 80;
    server_name geovise.io 159.223.122.52 localhost;
    return 404; # managed by Certbot


}